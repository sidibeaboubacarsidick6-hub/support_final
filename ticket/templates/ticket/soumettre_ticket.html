{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKS - Soumettre un incident</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; }
        .navbar-mks { background-color: #002d5b; color: white; padding: 1rem; margin-bottom: 2rem; }
        .card-custom { border: none; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); background: white; }
        .btn-primary-mks { background-color: #002d5b; border: none; padding: 12px; font-weight: 600; border-radius: 8px; color: white; width: 100%; }
        .form-label { font-weight: 600; color: #495057; }
    </style>
</head>
<body>

    <nav class="navbar-mks text-center">
        <h3 class="m-0">MKS SOFT TECHNOLOGIES</h3>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card-custom p-4">
                    <h2 class="text-center fw-bold mb-3">Soumettre un incident</h2>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Votre Nom / numéro de téléphone</label>
                            <input type="text" name="client" class="form-control" required placeholder="Ex: Jean Dupont">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Produit concerné</label>
                            <select name="produit" class="form-select">
                                <option value="moya_collecte">Moya Collecte</option>
                                <option value="ivoire_pass">Ivoire Pass</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quel est le problème rencontré ?</label>
                            <select name="type_probleme" id="type_probleme" class="form-select" onchange="toggleAutreField()" required>
                                <option value="" disabled selected>Choisir une option...</option>
                                <option value="PANNE_GENERALE">Le site ne s'ouvre plus</option>
                                <option value="PAIEMENT_ECHOUE">Paiement impossible</option>
                                <option value="CONNEXION">Erreur de connexion</option>
                                <option value="LENTEUR">L'application est trop lente</option>
                                <option value="AUTRE">Autre (Précisez ci-dessous)</option>
                            </select>
                        </div>

                        <div class="mb-3" id="group_suggestions" style="display: none;">
                            <label class="form-label">Détaillez votre problème</label>
                            <textarea name="suggestions_autre" id="suggestions_autre" class="form-control" rows="3"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary-mks mt-3">🚀 Envoyer l'incident</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleAutreField() {
            var select = document.getElementById('type_probleme');
            var group = document.getElementById('group_suggestions');
            group.style.display = (select.value === 'AUTRE') ? 'block' : 'none';
        }
    </script>
</body>
</html>
