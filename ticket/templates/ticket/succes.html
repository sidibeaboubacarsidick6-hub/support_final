<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Succès - MKS Support</title>
</head>
<body class="bg-light">
    <div class="container mt-5 text-center">
    <div class="card shadow p-5">
        <h1 class="text-success">✅ Requête envoyée !</h1>
        <p class="lead mt-3">
            Merci <strong>{{ ticket.client }}</strong>, votre requête concernant le produit <strong>{{ ticket.get_produit_display }}</strong> a été enregistrée.
        </p>
        <p>Votre numéro de suivi est : <span class="badge bg-dark">{{ ticket.numero_ticket }}</span></p>
        
        <div class="alert alert-info mt-3">
            Un technicien de <strong>MKS Soft Technologies</strong> traitera votre demande sous peu.
        </div>
        
        <hr>
        <div class="mt-4">
            <a href="{% url 'soumettre_ticket' %}" class="btn btn-outline-primary">Nouvelle requête</a>
        </div>
    </div>
</div>
</body>
</html>
