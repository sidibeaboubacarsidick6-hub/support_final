{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>MKS - {{ documentation.titre }}</title>
    <style>
        /* Optimisation pour l'impression papier */
        @media print {
            .no-print { display: none !important; }
            .container { width: 100%; max-width: 100%; }
            body { background: white; }
        }
    </style>
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4 no-print">
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">⬅ Retour Dashboard</a>
            <button onclick="window.print()" class="btn btn-primary">🖨️ Imprimer cette fiche</button>
        </div>

        <div class="card shadow-sm p-5 bg-white">
            <div class="text-center mb-4">
                <h2 style="color: #002d5b;">mks soft </h2>
                <hr>
            </div>

            <div class="row mb-4">
                <div class="col-8">
                    <h1 class="fw-bold">{{ documentation.titre }}</h1>
                    <p class="text-muted">Auteur : <strong>{{ documentation.auteur }}</strong></p>
                </div>
                <div class="col-4 text-end">
                    <p class="mb-0 text-muted">Date : {{ documentation.cree_le|date:"d/m/Y" }}</p>
                </div>
            </div>

            <div class="mt-4" style="font-size: 1.1rem; line-height: 1.8; text-align: justify;">
                {{ documentation.contenu|linebreaks }}
            </div>

            <div class="mt-5 pt-4 border-top text-center text-muted small">
                Document de traçabilité interne - Support N1
            </div>
        </div>
    </div>

</body>
</html>
